<!doctype html>
<html lang="fr-CA">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="author" content="Claudie Langlais">
        <meta name="description" content="Commander, brochure">

        <title>Commander une brochure gratuite</title>
        <link rel="normalize" href="css/normalize.css">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body class="body">
        <header class="header">
            <p class="header__p">Publication gratuite</p>
            <h1 class="header__titre">Commander une <strong class="header__strong">brochure</strong> gratuite</h1>
        </header>
        <main class="main">
            <form class="main__form" action="index.html" method="get">
                <fieldset class="main__fieldset">
                    <legend class="main__titre-section">
                        <img class="main__icone" src="images/icon-format-brochure.svg" alt="" width="5%">
                        <h2 class="main__sous-titre">Format de la brochure</h2>
                    </legend>
                    <ul class="main__format">
                        <li class="main__radio">
                            <input class="screen-reader-only" type="radio" name="file" id="file-print" required>
                            <label class="main__radio-button" for="file-print">
                                <img id="icon-file-print" src="images/icon-file-print.svg" alt=""/>
                                <p class="main__p">Imprimé</p>
                            </label>
                        </li>
                        <li class="main__radio">
                            <input class="screen-reader-only" type="radio" name="file" id="file-pdf" required>
                            <label class="main__radio-button" for="file-pdf">
                                <img id="icon-file-pdf" src="images/icon-file-pdf.svg" alt=""/>
                                <p class="main__p">PDF</p>
                            </label>
                        </li>
                        <li class="main__radio">
                            <input class="screen-reader-only" type="radio" name="file" id="file-epub" required>
                            <label class="main__radio-button" for="file-epub">
                                <img id="icon-file-epub" src="images/icon-file-epub.svg" alt="Icon pour epub"/>
                                <p class="main__p">ePub</p>
                            </label>
                        </li>
                    </ul>
                    <p class="message__icone" area-live="assertive"></p>
                </fieldset>
                <fieldset class="main__fieldset">
                    <legend class="main__titre-section">
                        <img class="main__icone" src="images/icon-contact.svg" alt="icône de document" width="5%">
                        <h2 class="main__sous-titre">Informations de contact</h2>
                    </legend>
                    <div class="main__contact">
                        <div class="main__nom-contact">
                            <div class="main__champs-contact">
                                <label for="prenom">Prénom</label>
                                <input type="text" name="prenom" id="prenom" required />
                                <p class="message__icone" area-live="assertive"></p>
                            </div>
                            <div class="main__champs-contact">
                                <label for="nom">Nom</label>
                                <input type="text" name="nom" id="nom" required/>
                                <p class="message__icone" area-live="assertive"></p>
                            </div>
                        </div>
                        <div class="main__champs-contact">
                            <label for="courriel">Courriel <strong class="main__exemple">(exemple@domaine.com)</strong></label>
                            <input type="text" name="courriel" id="courriel" required/>
                            <p class="message__icone" area-live="assertive"></p>
                        </div>
                        <div class="main__champs-contact">
                            <label for="telephone">Téléphone <strong class="main__exemple">(555-555-5555)</strong></label>
                            <input type="text" name="telephone" id="telephone" required/>
                            <p class="message__icone" area-live="assertive"></p>
                        </div>
                    </div>
                </fieldset>
                <fieldset class="main__fieldset">
                    <legend class="main__titre-section">
                        <img class="main__icone" src="images/icon-postal.svg" alt="icône de document" width="5%">
                        <h2 class="main__sous-titre">Informations postales</h2>
                    </legend>
                    <div class="main__postal">
                        <div class="main__champs-postal">
                            <label for="adresse">Adresse <strong class="main__exemple">(123, rue Principale)</strong></label>
                            <input type="text" name="adresse" id="adresse" required/>
                            <p class="message__icone" area-live="assertive"></p>
                        </div>
                        <div class="main__pays-postal">
                            <div class="main__champs-postal">
                                <label for="pays">Pays</label>
                                <select name="pays" required>
                                    <option value=""> - Sélectionner - </option>
                                    <option value="canada">Canada</option>
                                    <option value="etats-unis">États-Unis</option>
                                </select>
                                <p class="message__icone" area-live="assertive"></p>
                            </div>
                            <div class="main__champs-postal">
                                <label for="province">Province ou État</label>
                                <select name="province" required>
                                    <option value=""> - Sélectionner - </option>
                                    <optgroup label="Canada">
                                        <option value="AB">Alberta</option>
                                        <option value="BC">British Columbia</option>
                                        <option value="QC">Quebec</option>
                                    </optgroup>
                                    <optgroup label="États-Unis">
                                        <option value="CA">California</option>
                                        <option value="NY">New York</option>
                                    </optgroup>
                                </select>
                                <p class="message__icone" area-live="assertive"></p>
                            </div>
                        </div>
                        <div class="main__champs-postal">
                            <label for="code">Code postal <strong class="main__exemple">(A1A 1A1)</strong></label>
                            <input type="text" name="code" id="code" required/>
                            <p class="message__icone" area-live="assertive"></p>
                        </div>
                    </div>
                </fieldset>
                <fieldset class="main__fieldset">
                    <div class="main__cocher-infolettre">
                        <input name="infolettre" id="infolettre" type="checkbox" value="infolettre" />
                        <label for="infolettre">Je désire recevoir des informations mensuelles par courriel sur les nouvelles publications et ressources disponibles.</label>
                    </div>
                    <input class="main__button" type="submit" name="btnCommander" value="Commander" />
                </fieldset>
            </form>
        </main>
    </body>
</html>
